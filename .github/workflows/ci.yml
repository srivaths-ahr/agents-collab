name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        exclude:
          # macos-latest runners are arm64; setup-python has no 3.8/3.9 build there.
          # The 3.8 floor is still exercised on ubuntu + windows.
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile (no syntax/import errors)
        run: python -m py_compile driver.py executors.py
      - name: Unit tests (stdlib unittest — no dependencies)
        run: python -m unittest discover -s tests -t . -v

  lint:
    name: lint (ruff, CI-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ruff is a CI convenience, never a runtime dependency of the tool.
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check --output-format=github .
